description: This reel is a continuation of the IMSC-1.0.1_Text_TestContent
  assets. This reel was created with the same scope as the original reel, where
  the items that are tested are all pertinent to subtitles produced for
  production content. This version adds numerous additional tests that focus on
  foreign language rendering, color compositing to different color spaces, and
  some new IMSC 1.1 attributes. Like the original reel, this has been built to
  help manufacturers with their IMSC 1.1 Text implementations by providing them
  with a reference IMSC package.
repository: https://github.com/w3c/IMSC-1.1_Text_TestContent
